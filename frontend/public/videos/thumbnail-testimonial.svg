<svg width="400" height="225" viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-t" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="overlay-t" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.65"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="#0d1424"/>
  <!-- Grid -->
  <line x1="0" y1="45" x2="400" y2="45" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="90" x2="400" y2="90" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="135" x2="400" y2="135" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="180" x2="400" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="225" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="225" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="225" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Decorative -->
  <circle cx="340" cy="40" r="55" fill="url(#bg-t)" opacity="0.1"/>
  <circle cx="50" cy="185" r="40" fill="#f59e0b" opacity="0.07"/>
  <!-- Stats: before/after -->
  <rect x="25" y="45" width="160" height="100" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="105" y="70" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-family="Inter,sans-serif" font-weight="600">ANTES</text>
  <text x="105" y="100" text-anchor="middle" fill="#ef4444" font-size="24" font-family="Inter,sans-serif" font-weight="900">4h</text>
  <text x="105" y="118" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="Inter,sans-serif">tiempo respuesta</text>
  <rect x="215" y="45" width="160" height="100" rx="10" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="295" y="70" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="Inter,sans-serif" font-weight="700">AHORA</text>
  <text x="295" y="100" text-anchor="middle" fill="#10b981" font-size="24" font-family="Inter,sans-serif" font-weight="900">30s</text>
  <text x="295" y="118" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="Inter,sans-serif">respuesta automática</text>
  <!-- +38% badge -->
  <rect x="155" y="62" width="90" height="28" rx="14" fill="url(#bg-t)"/>
  <text x="200" y="81" text-anchor="middle" fill="white" font-size="14" font-family="Inter,sans-serif" font-weight="900">+38%</text>
  <!-- Play button -->
  <circle cx="200" cy="162" r="22" fill="url(#bg-t)" opacity="0.92"/>
  <polygon points="193,151 193,173 213,162" fill="white" opacity="0.95"/>
  <!-- Gradient overlay -->
  <rect width="400" height="225" fill="url(#overlay-t)"/>
  <!-- Duration badge -->
  <rect x="14" y="14" width="68" height="20" rx="4" fill="rgba(0,0,0,0.65)"/>
  <text x="48" y="28" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="700">35–40 seg</text>
  <!-- Title -->
  <text x="20" y="196" fill="white" font-size="13" font-family="Inter,sans-serif" font-weight="700">Caso Mística Hostels</text>
  <text x="20" y="213" fill="rgba(255,255,255,0.55)" font-size="10" font-family="Inter,sans-serif">Historia de éxito real · +38% reservas directas</text>
</svg>
