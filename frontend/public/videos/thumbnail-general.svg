<svg width="400" height="225" viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.65"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="#0d1424"/>
  <!-- Grid -->
  <line x1="0" y1="45" x2="400" y2="45" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="90" x2="400" y2="90" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="135" x2="400" y2="135" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="180" x2="400" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="225" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="225" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="225" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Decorative circles -->
  <circle cx="330" cy="45" r="60" fill="url(#bg-g)" opacity="0.12"/>
  <circle cx="70" cy="180" r="45" fill="#6366f1" opacity="0.08"/>
  <!-- Dashboard mockup lines -->
  <rect x="40" y="55" width="80" height="50" rx="8" fill="rgba(14,165,233,0.15)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <rect x="130" y="55" width="80" height="50" rx="8" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <rect x="220" y="55" width="80" height="50" rx="8" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="80" y="85" text-anchor="middle" fill="#0ea5e9" font-size="16" font-family="Inter,sans-serif" font-weight="900">38%</text>
  <text x="170" y="85" text-anchor="middle" fill="#6366f1" font-size="16" font-family="Inter,sans-serif" font-weight="900">24</text>
  <text x="260" y="85" text-anchor="middle" fill="#10b981" font-size="16" font-family="Inter,sans-serif" font-weight="900">$4.2M</text>
  <!-- Play button center -->
  <circle cx="200" cy="140" r="28" fill="url(#bg-g)" opacity="0.92"/>
  <polygon points="192,128 192,152 214,140" fill="white" opacity="0.95"/>
  <!-- Gradient overlay -->
  <rect width="400" height="225" fill="url(#overlay)"/>
  <!-- Duration badge -->
  <rect x="14" y="14" width="68" height="20" rx="4" fill="rgba(0,0,0,0.65)"/>
  <text x="48" y="28" text-anchor="middle" fill="white" font-size="10" font-family="Inter,sans-serif" font-weight="700">30–45 seg</text>
  <!-- Title -->
  <text x="20" y="196" fill="white" font-size="13" font-family="Inter,sans-serif" font-weight="700">Presentación General</text>
  <text x="20" y="213" fill="rgba(255,255,255,0.55)" font-size="10" font-family="Inter,sans-serif">Problema → Solución → CTA</text>
</svg>
