[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
# npm install (no `npm ci`) para tolerar drift entre package.json y package-lock.json
# E-AGENT-14: agregamos `form-data` para Whisper upload sin regenerar lock localmente.
cmds = ["npm install --omit=dev --no-audit --no-fund"]

[phases.build]
cmds = []

[start]
cmd = "node src/index.js"
